spring:
  application:
    name: queuetable
  datasource:
    url: jdbc:postgresql://localhost:5433/queuetable
    username: queuetable
    password: queuetable
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long!!}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
  qr:
    base-url: ${QR_BASE_URL:http://localhost:3000/restaurant}
    width: 300
    height: 300

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

logging:
  level:
    com.queuetable: DEBUG
    org.hibernate.SQL: DEBUG
